<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Holy Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        html, body {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -ms-touch-action: none;
            zoom: 100%;
        }

        body {
            background: url('Screenshot_20250117-170741.jpg') center/cover no-repeat fixed;
        }

        .calculator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: flex;
            flex-direction: column;
            touch-action: none;
            box-shadow: 
                0 0 5px #fff,
                0 0 10px #5271ff;
        }

        #display {
            width: 100%;
            height: 12vh;
            margin-bottom: 2vh;
            padding: 10px;
            font-size: 4vh;
            text-align: right;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 5px;
            pointer-events: none;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1vh;
            flex-grow: 1;
            height: 82vh;
            touch-action: manipulation;
        }

        button {
            padding: 5px;
            font-size: 3vh;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: scale(0.98);
        }

        .operator {
            background: rgba(82, 113, 255, 0.7);
            color: white;
        }

        .equals {
            background: rgba(39, 174, 96, 0.7);
            color: white;
        }

        .clear {
            background: rgba(231, 76, 60, 0.7);
            color: white;
        }

        @media (orientation: landscape) {
            .calculator {
                padding: 10px;
            }

            #display {
                height: 15vh;
                font-size: 3.5vh;
            }

            .buttons {
                gap: 0.8vh;
            }

            button {
                font-size: 2.5vh;
                padding: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="clear">C</button>
            <button class="operator">/</button>
            <button class="operator">×</button>
            <button class="operator">←</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">-</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">+</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="equals">=</button>
            <button style="grid-column: span 2;">0</button>
            <button>.</button>
            <button class="operator">%</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('button');

        // Prevent zoom
        window.addEventListener('touchstart', e => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        window.addEventListener('wheel', e => {
            if (e.ctrlKey) e.preventDefault();
        }, { passive: false });

        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === '+' || e.key === '-')) e.preventDefault();
        });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });

        // Calculator functionality
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const value = button.textContent;
                
                switch(value) {
                    case 'C':
                        display.value = '';
                        break;
                    case '←':
                        display.value = display.value.slice(0, -1);
                        break;
                    case '=':
                        try {
                            display.value = eval(display.value.replace('×', '*'));
                        } catch {
                            display.value = 'Error';
                        }
                        break;
                    case '%':
                        try {
                            display.value = eval(display.value) / 100;
                        } catch {
                            display.value = 'Error';
                        }
                        break;
                    default:
                        display.value += value === '×' ? '*' : value;
                }
            });
        });

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key >= '0' && e.key <= '9' || e.key === '.') {
                display.value += e.key;
            } else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                display.value += e.key;
            } else if (e.key === 'Enter') {
                try {
                    display.value = eval(display.value);
                } catch {
                    display.value = 'Error';
                }
            } else if (e.key === 'Backspace') {
                display.value = display.value.slice(0, -1);
            } else if (e.key === 'Escape') {
                display.value = '';
            }
        });
    </script>
</body>
    </html>
