<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Divine Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        html {
            overflow: hidden;
            touch-action: none;
            -ms-touch-action: none;
            zoom: 100%;
            -ms-content-zooming: none;
        }

        body {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            touch-action: none;
            -ms-touch-action: none;
        }

        .calculator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            touch-action: none;
            box-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #5271ff,
                0 0 82px #5271ff,
                0 0 92px #5271ff,
                0 0 102px #5271ff,
                0 0 151px #5271ff;
        }

        .calculator::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/api/placeholder/400/600') center/cover;
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        #display {
            width: 100%;
            height: 15vh;
            margin-bottom: 2vh;
            padding: 15px;
            font-size: 5vh;
            text-align: right;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
            pointer-events: none;
            touch-action: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2vh;
            flex-grow: 1;
            height: 80vh;
            touch-action: manipulation;
        }

        button {
            padding: 15px;
            font-size: 4vh;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        button:active {
            background: #39ff14;
            transform: scale(0.98);
        }

        .operator {
            background: rgba(82, 113, 255, 0.9);
            color: white;
        }

        .equals {
            background: rgba(39, 174, 96, 0.9);
            color: white;
        }

        .clear {
            background: rgba(231, 76, 60, 0.9);
            color: white;
        }

        @media (max-width: 768px) {
            .calculator {
                padding: 10px;
            }

            #display {
                height: 12vh;
                font-size: 4vh;
                margin-bottom: 1vh;
            }

            .buttons {
                gap: 1vh;
            }

            button {
                font-size: 3vh;
                padding: 5px;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            #display {
                height: 20vh;
                margin-bottom: 2vh;
            }

            .buttons {
                height: 75vh;
            }

            button {
                padding: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="addToDisplay('/')">/</button>
            <button class="operator" onclick="addToDisplay('*')">×</button>
            <button class="operator" onclick="backspace()">←</button>
            
            <button onclick="addToDisplay('7')">7</button>
            <button onclick="addToDisplay('8')">8</button>
            <button onclick="addToDisplay('9')">9</button>
            <button class="operator" onclick="addToDisplay('-')">-</button>
            
            <button onclick="addToDisplay('4')">4</button>
            <button onclick="addToDisplay('5')">5</button>
            <button onclick="addToDisplay('6')">6</button>
            <button class="operator" onclick="addToDisplay('+')">+</button>
            
            <button onclick="addToDisplay('1')">1</button>
            <button onclick="addToDisplay('2')">2</button>
            <button onclick="addToDisplay('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <button onclick="addToDisplay('0')" style="grid-column: span 2;">0</button>
            <button onclick="addToDisplay('.')">.</button>
            <button class="operator" onclick="calculatePercentage()">%</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        
        // Prevent all possible zoom events
        window.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('wheel', function(event) {
            if (event.ctrlKey) {
                event.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey && (event.key === '+' || event.key === '-')) {
                event.preventDefault();
            }
        });

        // Prevent double tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        function addToDisplay(value) {
            display.value += value;
        }
        
        function clearDisplay() {
            display.value = '';
        }
        
        function calculate() {
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = 'Error';
            }
        }
        
        function backspace() {
            display.value = display.value.slice(0, -1);
        }
        
        function calculatePercentage() {
            try {
                display.value = eval(display.value) / 100;
            } catch (error) {
                display.value = 'Error';
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (event) => {
            if (event.key >= '0' && event.key <= '9' || event.key === '.') {
                addToDisplay(event.key);
            } else if (event.key === '+' || event.key === '-' || event.key === '*' || event.key === '/') {
                addToDisplay(event.key);
            } else if (event.key === 'Enter') {
                calculate();
            } else if (event.key === 'Backspace') {
                backspace();
            } else if (event.key === 'Escape') {
                clearDisplay();
            }
        });
    </script>
</body>
    </html>
